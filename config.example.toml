# Vego Configuration Example
# Copy this file to ~/.vego/config.toml and fill in your values

[api]
key = "your-api-key"
model = "Pro/moonshotai/Kimi-K2.5"
base = "https://api.siliconflow.cn/v1"

# Character Configuration
# You can define multiple characters, each with their own workspace and bot tokens

[character.yuyan]
path = "workspace_yuyan"
telegram_bot_token = "your-telegram-bot-token"
discord_bot_token = "your-discord-bot-token"
# feishu_app_id = "your-feishu-app-id"
# feishu_app_secret = "your-feishu-app-secret"

[character.yunxiu]
path = "workspace_yunxiu"
telegram_bot_token = "your-telegram-bot-token"
# discord_bot_token = "your-discord-bot-token"

# Memory Configuration
[memory]
max_history_messages = 100      # Maximum messages to load into context
max_recent_messages = 100       # Messages to keep after compression
compress_threshold = 300        # Trigger compression when message count reaches this

# Scheduler Configuration
[scheduler]
enabled = true                  # Enable/disable daily memory consolidation
schedule_time = "3:00"          # Time to run daily tasks (24-hour format)
min_conversations = 20          # Minimum conversation rounds before processing

# Weekly Review Configuration
[weekly_review]
enabled = true                  # Enable/disable weekly review
day_of_week = 0                 # Day of week (0=Monday, 6=Sunday)
schedule_time = "4:00"          # Time to run weekly review (24-hour format)

# Proactive Chat Configuration
[proactive_chat]
enabled = true                  # Enable/disable proactive chat
active_hours_start = 6.5        # Start time (6.5 = 6:30 AM)
active_hours_end = 22.5         # End time (22.5 = 10:30 PM)
min_interval_hours = 2          # Minimum hours between proactive messages
# Random trigger: will check every hour and randomly decide whether to send
random_probability = 0.3        # 30% chance to send when checked

# Group Chat Configuration
[group_chat]
use_ai_judgment = true                    # Use AI to judge if should respond (costs tokens but smarter)
question_response_probability = 0.6       # 60% chance to respond to questions (if not using AI)
normal_response_probability = 0.2         # 20% chance to respond to normal messages (if not using AI)
message_expiry_minutes = 30               # Group messages older than this will be ignored (in minutes)
